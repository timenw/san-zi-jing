name: san_zi_jing
description: 亲子共读三字经 - AI配音+家长孩子跟读录音三轨比对
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  just_audio: 0.9.36
  record: ^4.4.4
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  path_provider: ^2.1.5
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# Force path_provider_android to 2.3.1 (a pure-Dart release with no AGP
# classpath pin). The older 2.2.15 hardcodes AGP 8.5.0 while
# shared_preferences_android pins 8.5.1; the two can't coexist and trip
# "Using different versions of the Android Gradle plugin ... is not allowed".
# 2.3.1 drops its own build.gradle so only the 8.5.1 constraint remains.
dependency_overrides:
  path_provider_android: 2.3.1

flutter:
  uses-material-design: true
  assets:
    - assets/audio/ai/
