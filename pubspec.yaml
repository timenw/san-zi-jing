name: san_zi_jing
description: 亲子共读三字经 - AI配音+家长孩子跟读录音三轨比对
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  just_audio: 0.9.36
  record: ^5.0.0
  shared_preferences: ^2.2.3
  provider: ^6.1.2
  path_provider: ^2.1.5
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

# Force shared_preferences_android down to 2.3.0. Versions >=2.4.0 hardcode
# AGP 8.5.1 in their android/build.gradle, which clashes with
# path_provider_android 2.2.15 (pins AGP 8.5.0) and trips
# "Using different versions of the Android Gradle plugin ... is not allowed".
# 2.3.0 does not pin an AGP version, so it inherits the app's AGP 8.5.0.
# Force record_android to 1.3.0: record 5.x resolves ^1.0.0 -> 1.5.2 which
# demands AGP 8.12/Kotlin 2.2 and uses flutter.compileSdkVersion (unavailable
# with the modern plugin loader). 1.3.0 hardcodes compileSdk 34, has a
# namespace, and is compatible with Flutter 3.24 / AGP 8.5.
# Force record_platform_interface to 1.0.2: record 5.x resolves ^1.0.2 -> 1.6.0,
# but record_linux (capped <1.0.0 -> 0.7.2) only implements the 1.0.2 API
# (RecordPlatform.startStream / hasPermission(String)). 1.6.0 moves startStream
# to a new base class, breaking record_linux 0.7.2's compile.
dependency_overrides:
  shared_preferences_android: 2.3.0
  record_android: 1.3.0
  record_platform_interface: 1.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/audio/ai/
