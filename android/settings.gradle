pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }
    includeBuild("${flutterSdkPath()}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }

    // Force a single Android Gradle Plugin version across ALL modules.
    // Several Flutter plugins hardcode their own AGP buildscript classpath
    // (e.g. path_provider_android=8.5.0, shared_preferences_android=8.5.1) and
    // AGP 8.x forbids mixing versions in one build. Align them all to 8.5.2.
    resolutionStrategy {
        eachPlugin {
            if (requested.id.id == 'com.android.application' || requested.id.id == 'com.android.library') {
                useVersion("8.5.2")
            }
        }
    }

    plugins {
        id "dev.flutter.flutter-plugin-loader" version "1.0.0"
        id "com.android.application" version "8.5.2" apply false
        id "org.jetbrains.kotlin.android" version "1.9.24" apply false
    }
}

// This is required for the dev.flutter.flutter-plugin-loader plugin to apply
// the dev.flutter.flutter-gradle-plugin to subprojects and inject the Flutter
// embedding (io.flutter.*) dependencies. Without it ":app:compileReleaseKotlin"
// fails with "Unresolved reference: io / FlutterActivity".
plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
}

include ":app"
