pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }
    includeBuild("${flutterSdkPath()}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }

    plugins {
        id "dev.flutter.flutter-plugin-loader" version "1.0.0"
        id "com.android.application" version "8.1.0" apply false
        id "org.jetbrains.kotlin.android" version "1.9.10" apply false
    }
}

// This is required for the dev.flutter.flutter-plugin-loader plugin to apply
// the dev.flutter.flutter-gradle-plugin to subprojects and inject the Flutter
// embedding (io.flutter.*) dependencies. Without it ":app:compileReleaseKotlin"
// fails with "Unresolved reference: io / FlutterActivity".
plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
}

include ":app"
